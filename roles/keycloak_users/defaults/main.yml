  #   email: user1@example.com
  #   password: password
  #   realm_name: master
  #   groups:
  #     - user1-group
  #     - users
  # # Example admin user with realm role mapping
  # - username: admin-user
  #   firstName: Admin
  #   lastName: User
  #   email: admin@example.com
  #   password: adminpassword
  #   realm_name: master
