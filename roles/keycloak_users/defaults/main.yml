---
# defaults file for keycloak

keycloak_auth_keycloak_url: "{{ undef(hint='Please define the Keycloak URL') }}" # URL to the Keycloak instance.
keycloak_auth_username: "admin" # Username to authenticate for API access with.
keycloak_auth_password: "{{ undef(hint='Please define the Keycloak authentication password') }}"

keycloak_auth_client_id: "admin-cli" # OpenID Connect client_id to authenticate to the API with.
keycloak_auth_client_secret: "" # Client Secret to use in conjunction with auth_client_id (if required).
keycloak_auth_realm: "master" # Keycloak realm name to authenticate to for API access.
keycloak_auth_validate_certs: true # Whether to validate SSL certificates when connecting to Keycloak.

keycloak_useraccounts: []
