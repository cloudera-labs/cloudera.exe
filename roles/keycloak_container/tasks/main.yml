# User and directory structure configuration
- name: Create group for keycloak
  ansible.builtin.group: 
    name: "{{ keycloak__system_groupname }}"
    state: present

- name: Create user for keycloak
  ansible.builtin.user: 
    name: "{{ keycloak__system_username }}"
    comment: "Keycloak User"
    group: "{{ keycloak__system_groupname }}"
    groups:
      - docker
    state: present

- name: Make directory for the service
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ keycloak__system_username }}"
    group: "{{ keycloak__system_groupname }}"
    mode: 0777
  loop:
    - "{{ service_root_dir }}"
    - "{{ service_root_dir }}/ssl"

# Docker Compose configuration
- name: Copy keycloak docker-compose.yml file into place.
  ansible.builtin.template:
    src: docker-compose.keycloak.yml.j2
    dest: "{{ service_root_dir }}/docker-compose.yml"
  vars:
    keycloak_home_dir: "{{ service_root_dir }}"

- name: Create .env file for docker-compose
  ansible.builtin.copy:
    dest: "{{ service_root_dir }}/.env"
    owner: "{{ keycloak__system_username }}"
    group: "{{ keycloak__system_groupname }}"
    mode: 0640
    content: |
      KEYCLOAK_ADMIN={{ keycloak__admin_username }}
      KEYCLOAK_ADMIN_PASSWORD={{ keycloak__admin_password }}

# NOTE: For TLS (replace with external certs)
# TLS cert and key configuration
- name: Create private key (RSA, 4096 bits)
  community.crypto.openssl_privatekey:
    path: "{{ service_root_dir }}/ssl/private.key"
    owner: "{{ keycloak__system_username }}"
    group: "{{ keycloak__system_groupname }}"
    mode: 0644

- name: Create certificate signing request (CSR) for self-signed certificate
  community.crypto.openssl_csr_pipe:
    privatekey_path: "{{ service_root_dir }}/ssl/private.key"
    common_name: "{{ keycloak__container_domain_name }}"
    organization_name: Cloudera, Inc.
    subject_alt_name:
      - "DNS:{{ keycloak__container_domain_name }}"
      - "IP:{{ keycloak__container_ip_address }}"
  register: __keycloak_csr

- name: Create self-signed certificate from CSR
  community.crypto.x509_certificate:
    path: "{{ service_root_dir }}/ssl/cert.pem"
    csr_content: "{{ __keycloak_csr.csr }}"
    privatekey_path: "{{ service_root_dir }}/ssl/private.key"
    provider: selfsigned
    owner: "{{ keycloak__system_username }}"
    group: "{{ keycloak__system_groupname }}"
    mode: 0644

# Systemd configuration
- name: Configure keycloak systemd service.
  ansible.builtin.template:
    src: "systemd_docker_compose_service.j2"
    dest: /etc/systemd/system/keycloak.service
  notify: Start Keycloak

