# User and directory structure configuration
- name: Create group for keycloak
  ansible.builtin.group:
    name: "{{ keycloak__system_groupname }}"
    state: present

- name: Create user for keycloak
  ansible.builtin.user:
    name: "{{ keycloak__system_username }}"
    comment: "Keycloak User"
    group: "{{ keycloak__system_groupname }}"
    groups:
      - docker
    state: present

- name: Make directory for the service
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ keycloak__system_username }}"
    group: "{{ keycloak__system_groupname }}"
    mode: 0777
  loop:
    - "{{ service_root_dir }}"
    - "{{ service_root_dir }}/ssl"

# Docker Compose configuration
- name: Copy keycloak docker-compose.yml file into place.
  ansible.builtin.template:
    src: docker-compose.keycloak.yml.j2
    dest: "{{ service_root_dir }}/docker-compose.yml"
  vars:
    keycloak_home_dir: "{{ service_root_dir }}"

- name: Create .env file for docker-compose
  ansible.builtin.copy:
    dest: "{{ service_root_dir }}/.env"
    owner: "{{ keycloak__system_username }}"
    group: "{{ keycloak__system_groupname }}"
    mode: 0640
    content: |
      KEYCLOAK_ADMIN={{ keycloak__admin_username }}
      KEYCLOAK_ADMIN_PASSWORD={{ keycloak__admin_password }}

# Systemd configuration
- name: Configure keycloak systemd service.
  ansible.builtin.template:
    src: "systemd_docker_compose_service.j2"
    dest: /etc/systemd/system/keycloak.service
  notify: Start Keycloak

# ...
