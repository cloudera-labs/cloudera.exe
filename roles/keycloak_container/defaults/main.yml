keycloak_container_name: keycloak-server
keycloak_container_image: quay.io/keycloak/keycloak
keycloak_container_tag: 26.0.7

keycloak_container_http_port: 8180
keycloak_container_https_port: 8543

keycloak_admin_username: "admin"
keycloak_admin_password: "{{ undef(hint='Please define the Keycloak authentication password') }}"

keycloak_system_username: keycloak
keycloak_system_groupname: keycloak

keycloak_docker_exe: /usr/bin/docker

# Keycloak container configuration options
keycloak_metrics_enabled: true
keycloak_health_enabled: true
keycloak_container_log_level: INFO
keycloak_proxy_headers: xforwarded
keycloak_http_enabled: true
keycloak_https_enabled: false
# keycloak_tls_key_path:
# keycloak_tls_cert_path:
