- name: Install System packages
  ansible.builtin.package:
    name: "{{ system_packages | default(__system_packages) }}"
    state: present

- name: Gather Python details
  ansible.builtin.setup:
    gather_subset:
      - python

- name: Set pip executable path
  ansible.builtin.set_fact:
    __pip_executable: "{{ '/usr/bin/pip' + [ansible_python['version']['major'], ansible_python['version']['minor']] | join('.') }}"

- name: Install Python packages
  ansible.builtin.pip:
    name: "{{ python_packages | default(__python_packages) }}"
    state: present
    executable: "{{ __pip_executable }}"
