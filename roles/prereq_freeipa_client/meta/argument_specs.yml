argument_specs:
  main:
    short_description: Install FreeIPA client prerequisites
    description:
      - Install system packages and Python packages required for FreeIPA client functionality.
      - Automatically detects the OS distribution and installs appropriate dependencies.
      - Installs the ipaclient Python package and its dependencies.
    author:
      - "Ronald Suplina <rsuplina@cloudera.com>"
    version_added: "3.3.0"
    options:
      system_packages:
        description:
          - List of system packages to install for FreeIPA client.
          - If not provided, OS-specific defaults will be used.
        type: list
        elements: str
        required: false
      python_packages:
        description:
          - List of Python packages to install for FreeIPA client functionality.
          - If not provided, defaults to ipaclient and packaging.
        type: list
        elements: str
        required: false
