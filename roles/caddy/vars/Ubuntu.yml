---

caddy_apt_repository: "deb [arch=amd64 signed-by=/etc/apt/keyrings/caddy.asc] https://dl.cloudsmith.io/public/caddy/stable/deb/debian any-version main"
caddy_apt_gpg_key: "https://dl.cloudsmith.io/public/caddy/stable/gpg.key"

caddy_packages:
  - caddy
  
caddy_service: "caddy"
